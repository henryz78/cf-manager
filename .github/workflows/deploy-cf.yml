name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      cf_api_key:
        description: 'Cloudflare Global API Key（仅在本脚本内使用，绝不打印到日志）'
        required: false
        type: string
      cf_email:
        description: 'Cloudflare 账号邮箱（仅在本脚本内使用，绝不打印到日志）'
        required: false
        type: string
      project_name:
        description: 'Pages 项目名称'
        required: false
        default: 'cfmgr'
        type: string
      d1_database_name:
        description: 'D1 数据库名称'
        required: false
        default: 'cfmgr'
        type: string
      kv_namespace_name:
        description: 'KV 命名空间名称（用于缓存和粘性路由）'
        required: false
        default: 'cfmgr'
        type: string
      encryption_key:
        description: '加密密钥（用于加密存储 API Token）'
        required: false
        default: 'cfmgrbest'
        type: string
      api_secret:
        description: '访问密码（留空则无需登录）'
        required: false
        default: 'cfmgrbest'
        type: string
      full_wipe:
        description: '完全覆盖：删除并重建 D1 数据库 + 清空 KV 命名空间'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 非交互 CI 下，wrangler 必须通过环境变量认证。
    # 输入的是 Cloudflare Global API Key，对应 wrangler 的 legacy 变量 CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL。
    # 注意：敏感输入绝不能放在 job 级 env —— 否则每个步骤的「env:」头都会把明文打印到日志。
    # 改为第一步就注册脱敏并写入 $GITHUB_ENV，后续步骤一律用 $VAR 引用（日志中均为 ***）。
    steps:
      - name: Mask secrets and export to env
        # 作为第一步注册脱敏，保证 checkout / setup-node 等步骤的 env 头也已被掩码。
        # 优先使用 GitHub Secrets 和 Variables，最后 fallback 到手动输入。
        # 直接引用相关上下文，不进 job 级 env；写 $GITHUB_ENV 时重定向到文件，不进 stdout。
        run: |
          CF_KEY="${{ secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_KEY || secrets.CF_API_KEY || vars.CF_API_KEY || github.event.inputs.cf_api_key }}"
          CF_MAIL="${{ secrets.CLOUDFLARE_EMAIL || vars.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CF_EMAIL || github.event.inputs.cf_email }}"
          ENC_KEY="${{ secrets.ENCRYPTION_KEY || vars.ENCRYPTION_KEY || github.event.inputs.encryption_key }}"
          API_SEC="${{ secrets.API_SECRET || vars.API_SECRET || github.event.inputs.api_secret }}"
          
          echo "::add-mask::$CF_KEY"
          echo "::add-mask::$CF_MAIL"
          echo "::add-mask::$ENC_KEY"
          echo "::add-mask::$API_SEC"
          
          echo "CLOUDFLARE_API_KEY=$CF_KEY" >> $GITHUB_ENV
          echo "CLOUDFLARE_EMAIL=$CF_MAIL" >> $GITHUB_ENV
          echo "ENCRYPTION_KEY=$ENC_KEY" >> $GITHUB_ENV
          echo "API_SECRET=$API_SEC" >> $GITHUB_ENV
          echo "PROJECT_NAME=${{ secrets.PROJECT_NAME || vars.PROJECT_NAME || github.event.inputs.project_name || 'cfmgr' }}" >> $GITHUB_ENV
          echo "D1_DATABASE_NAME=${{ secrets.D1_DATABASE_NAME || vars.D1_DATABASE_NAME || github.event.inputs.d1_database_name || 'cfmgr' }}" >> $GITHUB_ENV
          echo "KV_NAMESPACE_NAME=${{ secrets.KV_NAMESPACE_NAME || vars.KV_NAMESPACE_NAME || github.event.inputs.kv_namespace_name || 'cfmgr' }}" >> $GITHUB_ENV
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Resolve Cloudflare Account ID
        # D1 / KV 都是账户级资源；多账户下 wrangler 需要 CLOUDFLARE_ACCOUNT_ID。
        # 提前解析一次并写入 $GITHUB_ENV，供后续步骤复用（避免重复 whoami）。
        run: |
          ACCOUNT_ID=$(wrangler whoami 2>/dev/null | grep -oE '[0-9a-f]{32}' | head -1 || echo "")
          if [ -z "$ACCOUNT_ID" ]; then
            echo "WARNING: 无法获取 Account ID（多账户或认证异常），D1/KV 操作可能失败"
          else
            echo "Resolved Account ID: $ACCOUNT_ID"
          fi
          echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      - name: Setup D1 database
        id: d1
        run: |
          DB_NAME="${{ env.D1_DATABASE_NAME }}"

          # Account ID：优先复用前面解析的，否则回退 whoami
          ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID"
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID=$(wrangler whoami 2>/dev/null | grep -oE '[0-9a-f]{32}' | head -1 || echo "")
            echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          fi
          if [ -z "$ACCOUNT_ID" ]; then
            echo "WARNING: 无法解析 Account ID，D1 操作可能失败"
          fi

          # 用 CF REST API 查询 D1 列表（绕开 wrangler d1 list --json 在 4.x 的兼容性问题）
          list_d1() {
            curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database" \
              -H "X-Auth-Email: $CLOUDFLARE_EMAIL" \
              -H "X-Auth-Key: $CLOUDFLARE_API_KEY"
          }
          DB_LIST=$(list_d1)
          echo "=== CF REST API 查询 D1 数据库结果 ==="
          echo "$DB_LIST" | jq -r '.result[]? | "\(.name)\t\(.uuid)"' 2>/dev/null | head -10 || { echo "API 返回异常，原始输出:"; echo "$DB_LIST"; }

          # 按 name 精确匹配取 uuid
          get_db_id() {
            echo "$1" | jq -r --arg name "$2" '.result[]? | select(.name==$name) | .uuid' 2>/dev/null | head -1
          }

          # --- 完全覆盖：删除旧数据库 ---
          if [ "${{ github.event.inputs.full_wipe }}" = "true" ]; then
            echo "完全覆盖模式：尝试删除旧 D1 数据库..."
            DB_OLD_ID=$(get_db_id "$DB_LIST" "$DB_NAME")
            if [ -n "$DB_OLD_ID" ]; then
              echo "找到数据库 ID: $DB_OLD_ID，正在删除..."
              curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database/$DB_OLD_ID" \
                -H "X-Auth-Email: $CLOUDFLARE_EMAIL" \
                -H "X-Auth-Key: $CLOUDFLARE_API_KEY" >/dev/null
              sleep 3
              # 确认是否已消失
              DB_LIST2=$(list_d1)
              DB_STILL=$(get_db_id "$DB_LIST2" "$DB_NAME")
              if [ -n "$DB_STILL" ]; then
                echo "API 删除未生效，尝试 wrangler 按名称删除..."
                wrangler d1 delete "$DB_NAME" -y 2>&1 || echo "删除失败，继续"
                sleep 2
              fi
            else
              echo "未在列表中匹配到数据库，尝试 wrangler 按名称删除..."
              wrangler d1 delete "$DB_NAME" -y 2>&1 || echo "数据库可能不存在或已被删除"
              sleep 2
            fi
            # 删除后重新拉取列表
            DB_LIST=$(list_d1)
          fi

          DB_ID=$(get_db_id "$DB_LIST" "$DB_NAME")

          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database: $DB_NAME"
            wrangler d1 create "$DB_NAME"
            DB_LIST2=$(list_d1)
            DB_ID=$(get_db_id "$DB_LIST2" "$DB_NAME")
            echo "Created database with ID: $DB_ID"

            echo "Initializing database schema..."
            wrangler d1 execute "$DB_NAME" --file=worker/src/db/schema.sql --remote
          else
            echo "Database already exists: $DB_NAME (ID: $DB_ID)"
            if [ "${{ github.event.inputs.full_wipe }}" = "true" ]; then
              echo "完全覆盖模式：清空所有表数据..."
              wrangler d1 execute "$DB_NAME" --command="DROP TABLE IF EXISTS quota_usage" --remote || true
              wrangler d1 execute "$DB_NAME" --command="DROP TABLE IF EXISTS audit_log" --remote || true
              wrangler d1 execute "$DB_NAME" --command="DROP TABLE IF EXISTS app_settings" --remote || true
              wrangler d1 execute "$DB_NAME" --command="DROP TABLE IF EXISTS accounts" --remote || true
              echo "重新初始化 Schema..."
              wrangler d1 execute "$DB_NAME" --file=worker/src/db/schema.sql --remote
            fi
          fi

          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Run D1 migrations
        run: |
          DB_NAME="${{ env.D1_DATABASE_NAME }}"
          # 为旧表添加新列（已存在则静默失败）
          wrangler d1 execute "$DB_NAME" --command="ALTER TABLE quota_usage ADD COLUMN optimistic INTEGER DEFAULT 0" --remote 2>/dev/null || true

      - name: Seed deployment account (full wipe only)
        if: ${{ github.event.inputs.full_wipe == 'true' }}
        run: |
          DB_NAME="${{ env.D1_DATABASE_NAME }}"
          API_KEY="$CLOUDFLARE_API_KEY"
          API_EMAIL="$CLOUDFLARE_EMAIL"
          ENC_KEY="$ENCRYPTION_KEY"

          # 获取 Account ID（复用前面解析的 job 环境变量，避免重复 whoami）
          ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID"
          if [ -z "$ACCOUNT_ID" ]; then
            echo "WARNING: 无法获取 Account ID，account_id 将为空"
          fi

          # 使用 Node.js 加密 API Key（与 worker/src/services/encryption.ts 算法一致）
          ENCRYPTED=$(node -e "
            const crypto = require('node:crypto');
            const text = process.argv[1], rawKey = process.argv[2];
            const keyData = /^[0-9a-fA-F]{64}$/.test(rawKey)
              ? Buffer.from(rawKey, 'hex')
              : crypto.createHash('sha256').update(rawKey).digest();
            crypto.subtle.importKey('raw', keyData, 'AES-GCM', false, ['encrypt']).then(key => {
              const iv = crypto.getRandomValues(new Uint8Array(12));
              const encoded = new TextEncoder().encode(text);
              return crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded).then(encrypted => {
                console.log(Buffer.from(iv).toString('hex') + ':' + Buffer.from(encrypted).toString('hex'));
              });
            });
          " "$API_KEY" "$ENC_KEY")

          echo "插入部署账户..."
          wrangler d1 execute "$DB_NAME" --remote --command="INSERT INTO accounts (name, auth_type, api_key, email, account_id, enabled_features) VALUES ('Deploy Account', 'global_key', '$ENCRYPTED', '$API_EMAIL', '$ACCOUNT_ID', 'ai,workers,browser_render,dns,storage')"

      - name: Setup KV namespace
        id: kv
        run: |
          KV_NAME="${{ env.KV_NAMESPACE_NAME }}"

          # Account ID：优先复用前面解析的，否则回退 whoami（legacy 认证）
          ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID"
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID=$(wrangler whoami 2>/dev/null | grep -oE '[0-9a-f]{32}' | head -1 || echo "")
            echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          fi
          if [ -z "$ACCOUNT_ID" ]; then
            echo "WARNING: 无法解析 Account ID，KV 操作可能失败"
          fi

          # 用 CF REST API 查询（绕开 wrangler kv namespace list --json 在 4.x 的兼容性问题，
          # 同时保证 account 上下文与后续 wrangler 调用一致）
          list_kv() {
            curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/storage/kv/namespaces" \
              -H "X-Auth-Email: $CLOUDFLARE_EMAIL" \
              -H "X-Auth-Key: $CLOUDFLARE_API_KEY"
          }
          KV_LIST_FULL=$(list_kv)

          # --- 完全覆盖：删除同名 namespace ---
          if [ "${{ github.event.inputs.full_wipe }}" = "true" ]; then
            echo "完全覆盖模式：清空 KV 命名空间..."
            KV_OLD_ID=$(echo "$KV_LIST_FULL" | jq -r --arg name "$KV_NAME" '.result[]? | select(.title==$name) | .id' 2>/dev/null | head -1 || echo "")
            if [ -n "$KV_OLD_ID" ]; then
              echo "删除旧 KV namespace: $KV_OLD_ID"
              curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/storage/kv/namespaces/$KV_OLD_ID" \
                -H "X-Auth-Email: $CLOUDFLARE_EMAIL" \
                -H "X-Auth-Key: $CLOUDFLARE_API_KEY" >/dev/null
              echo "等待删除生效..."
              sleep 5
            else
              echo "未找到同名 KV namespace，跳过删除"
            fi
            # 删除后重新拉取列表
            KV_LIST_FULL=$(list_kv)
          fi

          echo "=== CF REST API 查询 KV namespace 结果 ==="
          echo "$KV_LIST_FULL" | jq -r '.result[]? | "\(.title)\t\(.id)"' 2>/dev/null || { echo "API 返回异常，原始输出:"; echo "$KV_LIST_FULL"; }

          KV_ID=$(echo "$KV_LIST_FULL" | jq -r --arg name "$KV_NAME" '.result[]? | select(.title==$name) | .id' 2>/dev/null | head -1 || echo "")

          if [ -z "$KV_ID" ]; then
            echo "未找到已有 namespace，尝试创建..."
            wrangler kv namespace create "$KV_NAME" 2>&1 || true
            # 创建后重新查询（兼容「已存在」冲突：用 API 回退拿到已有 ID，而非直接失败）
            KV_LIST_FULL=$(list_kv)
            KV_ID=$(echo "$KV_LIST_FULL" | jq -r --arg name "$KV_NAME" '.result[]? | select(.title==$name) | .id' 2>/dev/null | head -1 || echo "")
          fi

          if [ -z "$KV_ID" ]; then
            echo "ERROR: 无法获取 KV namespace ID"
            echo "请手动在 CF Dashboard 中查询 $KV_NAME 的 namespace ID 并填入 wrangler.toml"
            exit 1
          fi

          echo "KV namespace ready: $KV_NAME (ID: $KV_ID)"
          echo "kv_namespace_id=$KV_ID" >> $GITHUB_OUTPUT

      - name: Update wrangler.toml
        working-directory: worker
        run: |
          sed -i '/^main = /d' wrangler.toml
          sed -i '/^\[vars\]/,/^$/d' wrangler.toml
          sed -i "s/database_id = \".*\"/database_id = \"${{ steps.d1.outputs.database_id }}\"/" wrangler.toml
          sed -i "s/id = \"YOUR_KV_NAMESPACE_ID\"/id = \"${{ steps.kv.outputs.kv_namespace_id }}\"/" wrangler.toml
          sed -i "s/^name = \".*\"/name = \"${{ env.PROJECT_NAME }}\"/" wrangler.toml

      - name: Install worker dependencies
        working-directory: worker
        run: npm install

      - name: Build
        working-directory: worker
        run: node build.js

      - name: Create Pages project if not exists
        run: |
          PROJECT="${{ env.PROJECT_NAME }}"
          if wrangler pages project list 2>/dev/null | grep -qF "$PROJECT"; then
            echo "Project '$PROJECT' already exists, skipping creation"
          else
            wrangler pages project create "$PROJECT" --production-branch main
          fi

      - name: Configure secrets
        id: secrets
        run: |
          PROJECT="${{ env.PROJECT_NAME }}"
          DB_NAME="${{ env.D1_DATABASE_NAME }}"

          # 使用 here-string 传入，并用 $VAR 引用 job 环境变量，避免明文出现在回显的脚本里
          wrangler pages secret put ENCRYPTION_KEY --project-name "$PROJECT" <<< "$ENCRYPTION_KEY"
          if [ -n "$API_SECRET" ]; then
            wrangler pages secret put API_SECRET --project-name "$PROJECT" <<< "$API_SECRET"
          fi

          # 仅在启用演示模式时，从 D1 自动获取所有账户 ID 作为演示模式保护列表
          if [ "${{ secrets.DEMO_MODE || vars.DEMO_MODE }}" = "true" ]; then
            echo "演示模式已启用，查询 D1 中的账户列表..."
            # 注意：不能用 2>&1，否则 wrangler 的警告会污染 JSON；stderr 丢弃即可
            ACCOUNT_JSON=$(wrangler d1 execute "$DB_NAME" --remote --command="SELECT GROUP_CONCAT(id) AS ids FROM accounts" --json 2>/dev/null || true)
            echo "D1 查询原始输出: $ACCOUNT_JSON"
            # 用 node 解析 JSON，兼容空表（ids 为 null）和 wrangler v4 的数组结构
            DEMO_IDS=$(node -e '
              const input = process.argv[1] || "";
              try {
                const data = JSON.parse(input);
                // wrangler d1 execute --json 输出为数组，取第一个对象的 ids 字段
                const row = Array.isArray(data) ? data[0] : data;
                const ids = row?.results?.[0]?.ids ?? row?.ids ?? null;
                if (ids !== null && ids !== undefined && String(ids).trim()) console.log(String(ids));
              } catch (e) {
                console.error("JSON 解析失败: " + e.message);
              }
            ' "$ACCOUNT_JSON" || echo "")
            if [ -n "$DEMO_IDS" ]; then
              echo "保护账户 IDs: $DEMO_IDS"
              echo "$DEMO_IDS" | wrangler pages secret put DEMO_ACCOUNT_IDS --project-name "$PROJECT"
            else
              echo "暂无账户，跳过 DEMO_ACCOUNT_IDS 设置"
            fi
            echo "demo_ids=$DEMO_IDS" >> $GITHUB_OUTPUT
          else
            echo "演示模式未启用，自动清理云端已有的 DEMO_ACCOUNT_IDS 保护设置..."
            # 自动删除可能存在的 DEMO_ACCOUNT_IDS 秘钥，防止自建用户历史遗留锁定，使用 || true 防止秘钥不存在时报错导致部署失败
            wrangler pages secret delete DEMO_ACCOUNT_IDS --project-name "$PROJECT" || true
            echo "demo_ids=" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        working-directory: worker
        run: |
          # 不显式传目录：wrangler.toml 已配置 pages_build_output_dir = "public"
          wrangler pages deploy --project-name "${{ env.PROJECT_NAME }}" --branch main --commit-dirty

          # 获取 Account ID（优先复用前面解析的，否则回退 whoami）
          ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID:-$(wrangler whoami 2>/dev/null | grep -oE '[0-9a-f]{32}' | head -1 || echo "")}"

          # 通过 CF API 查询项目的实际 subdomain
          if [ -n "$ACCOUNT_ID" ]; then
            PROJECT_DETAILS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/${{ env.PROJECT_NAME }}" \
              -H "X-Auth-Email: $CLOUDFLARE_EMAIL" \
              -H "X-Auth-Key: $CLOUDFLARE_API_KEY")
            echo "Project API response: $PROJECT_DETAILS"
            RAW_SUBDOMAIN=$(echo "$PROJECT_DETAILS" | jq -r '.result.subdomain // empty' | tr -d '\r\n')
            echo "RAW_SUBDOMAIN=[$RAW_SUBDOMAIN]"
            # 统一处理：API 返回的 subdomain 可能是前缀(mgrcf)或完整域名(mgrcf.pages.dev)，
            # 用纯 bash 字符串处理剥掉末尾的 .pages.dev（不依赖 sed/正则引擎）。
            case "$RAW_SUBDOMAIN" in
              *.pages.dev)  PROJECT_SUBDOMAIN="${RAW_SUBDOMAIN%.pages.dev}" ;;
              *.pages.dev/) PROJECT_SUBDOMAIN="${RAW_SUBDOMAIN%.pages.dev/}" ;;
              *)            PROJECT_SUBDOMAIN="$RAW_SUBDOMAIN" ;;
            esac
          fi

          # 兜底：拿不到则使用「项目名」
          if [ -z "$PROJECT_SUBDOMAIN" ]; then
            echo "WARNING: 无法获取项目 subdomain，fallback 使用项目名"
            PROJECT_SUBDOMAIN="${{ env.PROJECT_NAME }}"
          fi
          PROJECT_SUBDOMAIN="${PROJECT_SUBDOMAIN}.pages.dev"

          echo "实际部署域名: ${PROJECT_SUBDOMAIN}"
          echo "deploy_url=https://${PROJECT_SUBDOMAIN}/admin/" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "## 部署完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| CF 邮箱 | (出于安全不显示) |" >> $GITHUB_STEP_SUMMARY
          echo "| CF API Key | **** (已隐藏) |" >> $GITHUB_STEP_SUMMARY
          echo "| Pages 项目 | ${{ env.PROJECT_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| D1 数据库 | ${{ env.D1_DATABASE_NAME }} (${{ steps.d1.outputs.database_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| KV 命名空间 | ${{ env.KV_NAMESPACE_NAME }} (${{ steps.kv.outputs.kv_namespace_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 完全覆盖 | ${{ github.event.inputs.full_wipe }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 演示保护账户 IDs | ${{ steps.secrets.outputs.demo_ids }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 访问地址 | ${{ steps.deploy.outputs.deploy_url }} |" >> $GITHUB_STEP_SUMMARY
